mixin:
  dns:
    enable: true
    ipv6: false
    default-nameserver:
      - 223.5.5.5
      - 119.29.29.29
    enhanced-mode: redir-host
    fake-ip-range: 198.18.0.1/16
    use-hosts: true
    nameserver:
      - 119.29.29.29
      - 223.5.5.5
      - 8.8.8.8
      - 1.1.1.1
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    fallback:
      - tls://1.0.0.1:853
      - https://cloudflare-dns.com/dns-query
      - https://dns.google/dns-query
    fallback-filter:
      geoip: true
      ipcidr:
        - 240.0.0.0/4
        - 0.0.0.0/32
  tun:
    enable: true
    stack: gvisor
    dns-hijack:
      - 198.18.0.2:53
    macOS-auto-route: true
    macOS-auto-detect-interface: true